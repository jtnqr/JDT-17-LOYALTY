name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"

jobs:
  # ─────────────────────────────────────────────
  # Backend: Maven + JaCoCo
  # ─────────────────────────────────────────────
  backend:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: loyalty_test
          POSTGRES_USER: loyalty
          POSTGRES_PASSWORD: loyalty_test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loyalty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/loyalty_test
      SPRING_DATASOURCE_USERNAME: loyalty
      SPRING_DATASOURCE_PASSWORD: loyalty_test_pw
      JWT_SECRET: ci_test_secret_do_not_use_in_production_at_all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests + generate JaCoCo report
        working-directory: backend
        run: ./mvnw verify -B

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

      - name: JaCoCo coverage summary
        if: always()
        run: |
          REPORT=backend/target/site/jacoco/index.html
          if [ ! -f "$REPORT" ]; then
            echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "No JaCoCo report generated." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          MISSED=$(grep -oP 'Total[^%]+?<td class="ctr2">\K[^<]+' "$REPORT" | head -1)
          COVERED=$(grep -oP '<td class="ctr1">\K[0-9]+' "$REPORT" | awk '{s+=$1}END{print s}')
          TOTAL=$(grep -oP '<td class="ctr2">\K[0-9]+' "$REPORT" | awk '{s+=$1}END{print s}')
          # Parse instruction coverage percentage from CSV (more reliable)
          CSV=backend/target/site/jacoco/jacoco.csv
          if [ -f "$CSV" ]; then
            INSTR_MISSED=$(awk -F',' 'NR>1{m+=$4}END{print m}' "$CSV")
            INSTR_COVERED=$(awk -F',' 'NR>1{c+=$5}END{print c}' "$CSV")
            INSTR_TOTAL=$((INSTR_MISSED + INSTR_COVERED))
            if [ "$INSTR_TOTAL" -gt 0 ]; then
              PCT=$(awk "BEGIN{printf \"%.1f\", ($INSTR_COVERED/$INSTR_TOTAL)*100}")
            else
              PCT="N/A"
            fi
            BRANCH_MISSED=$(awk -F',' 'NR>1{m+=$6}END{print m}' "$CSV")
            BRANCH_COVERED=$(awk -F',' 'NR>1{c+=$7}END{print c}' "$CSV")
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            if [ "$BRANCH_TOTAL" -gt 0 ]; then
              BPCT=$(awk "BEGIN{printf \"%.1f\", ($BRANCH_COVERED/$BRANCH_TOTAL)*100}")
            else
              BPCT="N/A"
            fi
          fi
          {
            echo "## Backend Coverage (JaCoCo)"
            echo "| Metric | Covered | Missed | Total | % |"
            echo "|--------|---------|--------|-------|---|"
            echo "| Instructions | $INSTR_COVERED | $INSTR_MISSED | $INSTR_TOTAL | $PCT% |"
            echo "| Branches | $BRANCH_COVERED | $BRANCH_MISSED | $BRANCH_TOTAL | $BPCT% |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Post JaCoCo comment on PR
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CSV=backend/target/site/jacoco/jacoco.csv
          if [ ! -f "$CSV" ]; then
            BODY="### Backend Coverage (JaCoCo)\nNo coverage report generated — tests may have failed."
          else
            INSTR_MISSED=$(awk -F',' 'NR>1{m+=$4}END{print m}' "$CSV")
            INSTR_COVERED=$(awk -F',' 'NR>1{c+=$5}END{print c}' "$CSV")
            INSTR_TOTAL=$((INSTR_MISSED + INSTR_COVERED))
            PCT=$([ "$INSTR_TOTAL" -gt 0 ] && awk "BEGIN{printf \"%.1f\", ($INSTR_COVERED/$INSTR_TOTAL)*100}" || echo "N/A")
            BRANCH_MISSED=$(awk -F',' 'NR>1{m+=$6}END{print m}' "$CSV")
            BRANCH_COVERED=$(awk -F',' 'NR>1{c+=$7}END{print c}' "$CSV")
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            BPCT=$([ "$BRANCH_TOTAL" -gt 0 ] && awk "BEGIN{printf \"%.1f\", ($BRANCH_COVERED/$BRANCH_TOTAL)*100}" || echo "N/A")
            BODY="### Backend Coverage (JaCoCo)
          | Metric | Covered | Missed | Total | % |
          |--------|---------|--------|-------|---|
          | Instructions | $INSTR_COVERED | $INSTR_MISSED | $INSTR_TOTAL | ${PCT}% |
          | Branches | $BRANCH_COVERED | $BRANCH_MISSED | $BRANCH_TOTAL | ${BPCT}% |

          Full report: [Download artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY"

  # ─────────────────────────────────────────────
  # Frontend: Vitest coverage
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload Vitest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Vitest coverage summary
        if: always()
        run: |
          SUMMARY=frontend/coverage/coverage-summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "No Vitest coverage report generated (no tests yet)." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          LINES=$(jq '.total.lines.pct' "$SUMMARY")
          STMTS=$(jq '.total.statements.pct' "$SUMMARY")
          FUNCS=$(jq '.total.functions.pct' "$SUMMARY")
          BRANCH=$(jq '.total.branches.pct' "$SUMMARY")
          {
            echo "## Frontend Coverage (Vitest)"
            echo "| Metric | % |"
            echo "|--------|---|"
            echo "| Statements | ${STMTS}% |"
            echo "| Branches | ${BRANCH}% |"
            echo "| Functions | ${FUNCS}% |"
            echo "| Lines | ${LINES}% |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Post Vitest comment on PR
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SUMMARY=frontend/coverage/coverage-summary.json
          if [ ! -f "$SUMMARY" ]; then
            BODY="### Frontend Coverage (Vitest)\nNo coverage report generated — no tests yet."
          else
            LINES=$(jq '.total.lines.pct' "$SUMMARY")
            STMTS=$(jq '.total.statements.pct' "$SUMMARY")
            FUNCS=$(jq '.total.functions.pct' "$SUMMARY")
            BRANCH=$(jq '.total.branches.pct' "$SUMMARY")
            BODY="### Frontend Coverage (Vitest)
          | Metric | % |
          |--------|---|
          | Statements | ${STMTS}% |
          | Branches | ${BRANCH}% |
          | Functions | ${FUNCS}% |
          | Lines | ${LINES}% |

          Full report: [Download artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY"
