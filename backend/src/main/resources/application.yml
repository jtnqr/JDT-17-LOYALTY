spring:
  application:
    name: loyalty-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jdt17_loyalty}
    username: ${DB_USER:loyalty}
    password: ${DB_PASSWORD:loyalty_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 5MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long-placeholder}
  expiration: 86400000 # 24h in ms

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app:
  uploads:
    dir: ${UPLOAD_DIR:/app/uploads}

logging:
  level:
    com.jdt17.loyalty: DEBUG
    org.springframework.security: INFO
