spring:
  application:
    name: loyalty-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jdt17_loyalty}
    username: ${DB_USER:loyalty}
    password: ${DB_PASSWORD:loyalty_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long-placeholder}
  expiration: 86400000  # 24h in ms

logging:
  level:
    com.jdt17.loyalty: DEBUG
    org.springframework.security: INFO
